name: Build and Push Docker Image

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  MISE_VERBOSE: 1
  GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-lint
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Lint Dockerfile
        run: mise run lint

  build-test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v7
        with:
          push: false
          load: true
          tags: dev-docker-ci:verify

      - name: Verify node in built image
        run: >-
          docker run --rm dev-docker-ci:verify node --version
      - name: Verify node in built image
        run: >-
          docker run --rm dev-docker-ci:verify node --version
      - name: Verify rust in built image
        run: >-
          docker run --rm dev-docker-ci:verify rustc --version
      - name: Verify hadolint in built image
        run: >-
          docker run --rm dev-docker-ci:verify hadolint --version

  push:
    needs: [lint, build-test]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/dev-docker
          tags: |
            type=raw,value=stable
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,format=long

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
