name: Build and Push Docker Image

# builds, lints, and verifies examples on every push; only adds stable/latest/date tags on main
on:
  # ideally we want this on PRs, but gitea actions show the PR number rather than the
  # branch name, so have it build on each commit to any branch, which elegantly shows
  # the branch name (which is typically the PR name anyway)
  push:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 3" # Every Wednesday at 22:30 UTC

env:
  GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  CI_IMAGE: ${{ vars.DOCKER_USERNAME }}/dev-docker

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: prepare ───────────────────────────────────────────────────────────
  # Computes run metadata once so later jobs use the exact same tag values.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      gazelle_sha_tag: ${{ steps.meta.outputs.gazelle_sha_tag }}
      date_tag: ${{ steps.meta.outputs.date_tag }}
    steps:
      - name: Set run metadata
        id: meta
        run: |
          echo "gazelle_sha_tag=gazelle-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "date_tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

  # ── Job 2: build ─────────────────────────────────────────────────────────────
  # Builds the image and pushes it to Docker Hub tagged with the commit SHA.
  # Using buildx push-only (no --load), so nothing is left in local Docker.
  build:
    needs: prepare
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push SHA-tagged image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          push: true
          tags: ${{ env.CI_IMAGE }}:${{ needs.prepare.outputs.gazelle_sha_tag }}

  # ── Job 3: lint ──────────────────────────────────────────────────────────────
  # Runs lint tasks directly inside the SHA-tagged image as a container job.
  # The checkout action supplies the repo files; mise handles the workspace checks.
  # MISE_YES=1 auto-trusts the workspace mise.toml (path differs from /app at build time).
  lint:
    needs: [prepare, build]
    timeout-minutes: 20
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.DOCKER_USERNAME }}/dev-docker:${{ needs.prepare.outputs.gazelle_sha_tag }}
      credentials:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    env:
      MISE_YES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trust workspace mise config
        run: mise trust --yes "$GITHUB_WORKSPACE/mise.toml"

      - name: Run lint tasks
        run: mise run lint

  # ── Job 4: verify_examples ──────────────────────────────────────────────────
  # Builds both example projects in parallel using a matrix strategy.
  verify_examples:
    needs: [prepare, build]
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - rust
          - node
    container:
      image: ${{ vars.DOCKER_USERNAME }}/dev-docker:${{ needs.prepare.outputs.gazelle_sha_tag }}
      credentials:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    env:
      MISE_YES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trust example mise configs
        run: |
          mise trust --yes "$GITHUB_WORKSPACE/examples/rust-hello/mise.toml"
          mise trust --yes "$GITHUB_WORKSPACE/examples/node-hello/mise.toml"

      - name: Build Rust example
        if: matrix.example == 'rust'
        working-directory: examples/rust-hello
        run: mise run build

      - name: Build Node example
        if: matrix.example == 'node'
        working-directory: examples/node-hello
        run: mise run build

  # ── Job 5: tag ───────────────────────────────────────────────────────────────
  # Pulls the linted and example-verified SHA image and adds the stable/latest/date tags (main only).
  tag:
    needs: [prepare, lint, verify_examples]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull SHA-tagged image
        run: docker pull "${{ env.CI_IMAGE }}:${{ needs.prepare.outputs.gazelle_sha_tag }}"

      - name: Tag and push additional tags
        run: |
          set -euo pipefail
          for tag in latest stable "${{ needs.prepare.outputs.date_tag }}"; do
            docker tag "${{ env.CI_IMAGE }}:${{ needs.prepare.outputs.gazelle_sha_tag }}" "${{ env.CI_IMAGE }}:$tag"
            docker push "${{ env.CI_IMAGE }}:$tag"
            docker rmi "${{ env.CI_IMAGE }}:$tag" 2>/dev/null || true
          done

  # ── Job 6: cleanup_local ─────────────────────────────────────────────────────
  # Runs last and removes the local SHA image copy from the runner host.
  cleanup_local:
    needs: [prepare, lint, verify_examples, tag]
    if: always()
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Remove local SHA image copy
        run: |
          docker rmi "${{ env.CI_IMAGE }}:${{ needs.prepare.outputs.gazelle_sha_tag }}" 2>/dev/null || true

      # these should have been removed after pushing in the previous step, but better safe than sorry
      - name: Remove promoted local tags (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker rmi "${{ env.CI_IMAGE }}:latest" 2>/dev/null || true
          docker rmi "${{ env.CI_IMAGE }}:stable" 2>/dev/null || true
          docker rmi "${{ env.CI_IMAGE }}:${{ needs.prepare.outputs.date_tag }}" 2>/dev/null || true
