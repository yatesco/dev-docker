name: Build and Push Docker Image

# ideally we want this on PRs, but gitea actions show the PR number rather than the
# branch name, so have it build on each commit to any branch, which elegantly shows
# the branch name (which is typically the PR name anyway)
on:
  push:
  workflow_dispatch:

env:
  MISE_VERBOSE: 1
  GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-lint
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3

      - name: Install tools
        run: mise install

      - name: Lint Dockerfile
        run: mise run lint

  build-test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image (test only)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          push: false
          load: true
          tags: dev-docker-ci:verify

      - name: Verify node in built image
        run: >-
          docker run --rm dev-docker-ci:verify node --version
      - name: Verify node in built image
        run: >-
          docker run --rm dev-docker-ci:verify node --version
      - name: Verify rust in built image
        run: >-
          docker run --rm dev-docker-ci:verify rustc --version
      - name: Verify hadolint in built image
        run: >-
          docker run --rm dev-docker-ci:verify hadolint --version

  push:
    needs: [lint, build-test]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/dev-docker
          tags: |
            type=raw,value=stable
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,format=long

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
